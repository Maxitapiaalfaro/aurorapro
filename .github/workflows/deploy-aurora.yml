# ──────────────────────────────────────────────────────────────
# Aurora Clinical Intelligence – Automated Deploy Pipeline
# Fase 5b: GitOps CI/CD con Workload Identity Federation
# ──────────────────────────────────────────────────────────────
name: Deploy Aurora (Firebase)

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "lib/**"
      - "types/**"
      - "firestore.indexes.json"

concurrency:
  group: deploy-aurora-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate via Workload Identity Federation ───
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── 3. Setup Node.js ───────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # ── 4. Install dependencies ────────────────────────────
      - name: Install dependencies
        working-directory: ./functions
        run: npm ci

      # ── 5. Compile TypeScript ──────────────────────────────
      - name: Build Cloud Functions
        working-directory: ./functions
        run: npm run build

      # ── 6. Install Firebase CLI ────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ── 7. Deploy Firestore indexes ────────────────────────
      - name: Deploy Firestore Indexes
        run: firebase deploy --only firestore:indexes

      # ── 8. Deploy Cloud Functions ──────────────────────────
      - name: Deploy Cloud Functions
        run: firebase deploy --only functions
