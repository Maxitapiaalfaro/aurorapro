# ──────────────────────────────────────────────────────────────
# Aurora  Clinical Intelligence – Automated Deploy Pipeline
# Fase 5b: GitOps CI/CD con Workload Identity Federation
# ──────────────────────────────────────────────────────────────
name: Deploy Aurora (Firebase)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "lib/**"
      - "types/**"
      - "firestore.indexes.json"

concurrency:
  group: deploy-aurora-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate via Workload Identity Federation ───
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── 3. Setup Node.js ───────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # ── 4. Install dependencies ────────────────────────────
      - name: Install dependencies
        working-directory: ./functions
        run: npm ci

      # ── 5. Compile TypeScript ──────────────────────────────
      - name: Build Cloud Functions
        working-directory: ./functions
        run: npm run build

      # ── 6. Install Firebase CLI ────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ── 7. Deploy Firestore indexes ────────────────────────
      - name: Deploy Firestore Indexes
        run: firebase deploy --only firestore:indexes

      # ── 8. Setup gcloud CLI ─────────────────────────────────
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── 9. Configure IAM bindings for Cloud Functions v2 ────
      - name: Configure IAM bindings for Cloud Functions
        run: |
          PROJECT_ID=$(jq -r '.projects.default' .firebaserc)
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::error::Failed to read project ID from .firebaserc"
            exit 1
          fi

          PROJECT_NUMBER=$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "::error::Failed to retrieve project number for $PROJECT_ID"
            exit 1
          fi

          echo "Configuring IAM bindings for project $PROJECT_ID (number: $PROJECT_NUMBER)"

          # Pub/Sub service agent needs token creator role for authenticated push
          gcloud projects add-iam-policy-binding "$PROJECT_ID" \
            --member="serviceAccount:service-${PROJECT_NUMBER}@gcp-sa-pubsub.iam.gserviceaccount.com" \
            --role="roles/iam.serviceAccountTokenCreator" \
            --condition=None --no-user-output-enabled

          # Default compute SA needs Cloud Run invoker role
          gcloud projects add-iam-policy-binding "$PROJECT_ID" \
            --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
            --role="roles/run.invoker" \
            --condition=None --no-user-output-enabled

          # Default compute SA needs Eventarc event receiver role
          gcloud projects add-iam-policy-binding "$PROJECT_ID" \
            --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
            --role="roles/eventarc.eventReceiver" \
            --condition=None --no-user-output-enabled

      # ── 10. Delete function whose trigger type changed ──────
      # calculateTrajectoryDeltas was originally deployed as HTTPS
      # and is now an onDocumentWritten (Firestore) trigger.
      # Firebase forbids changing trigger types in-place, so we
      # delete the old version first. --force skips the prompt;
      # "|| true" lets the step pass if the function no longer exists.
      - name: Delete legacy HTTPS function (trigger type migration)
        run: |
          firebase functions:delete calculateTrajectoryDeltas \
            --region us-central1 \
            --force || true

      # ── 11. Deploy Cloud Functions ──────────────────────────
      - name: Deploy Cloud Functions
        run: firebase deploy --only functions
